# Clé unique du projet
sonar.organization=andrimirana
sonar.projectKey=Andrimirana_skillhub-examen
sonar.projectName=SkillHub - Examen
sonar.projectVersion=1.0

# Sources à analyser
sonar.sources=services/auth/app,services/catalog/app,services/inscription/app,frontend/src

# Encodage
sonar.sourceEncoding=UTF-8

# EXCLUSIONS
sonar.exclusions=**/node_modules/**,**/vendor/**,**/storage/**,**/bootstrap/cache/**,**/dist/**,**/build/**,**/*.spec.js,**/*.test.js,**/tests/**

# Exclusions de couverture : modèles et contrôleurs MongoDB (nécessitent une connexion MongoDB réelle)
sonar.coverage.exclusions=**/Models/ActivityLog.php,**/Controllers/ActivityLogController.php

# Exclusions CPD : fichiers dupliqués intentionnellement entre microservices (isolation par conception)
sonar.cpd.exclusions=**/Services/MongoActivityLogger.php,**/Middleware/ValidateServiceToken.php

# TESTS 
sonar.tests=services/auth/tests,services/catalog/tests,services/inscription/tests

# ==========================================
# COUVERTURE (optionnel, à activer si tu génères les rapports)
# ==========================================

# Frontend JS
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# PHP (Laravel) - couverture des 3 services
sonar.php.coverage.reportPaths=services/auth/coverage.xml,services/catalog/coverage.xml,services/inscription/coverage.xml